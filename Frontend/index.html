<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Crypto App</title>
<style>
body{margin:0;font-family:Arial;background:#000;color:#fff;text-align:center;}
.screen{display:none;padding:20px;}
.active{display:block;}
button{padding:15px;border:none;border-radius:20px;background:#ff9800;color:#fff;margin:10px;}
.card{background:#111;padding:20px;border-radius:20px;margin:10px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="screen active">
<h2>Login</h2>
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
<button onclick="register()">Register</button>
</div>

<!-- HOME -->
<div id="home" class="screen">
<div class="card">
Coins: <span id="coins">0</span><br>
USDT: <span id="usdt">0</span>
</div>

<button onclick="tap()">Tap (+50)</button>
<button onclick="daily()">Daily (+1000)</button>

<div class="card">
<button onclick="task('Telegram')">Telegram +500</button>
<button onclick="task('TikTok')">TikTok +1000</button>
<button onclick="task('YouTube')">YouTube +500</button>
</div>

<button onclick="goWithdraw()">Withdraw</button>
</div>

<!-- WITHDRAW -->
<div id="withdraw" class="screen">
<h2>Withdraw</h2>
<p id="status"></p>
<button onclick="withdraw()">Withdraw</button>
<button onclick="deposit()">Unlock ($5)</button>
<button onclick="back()">Back</button>
</div>

<script>
const API = "https://crypto-4bbj.onrender.com";

let token=null, coins=0, usdt=0, referrals=0, unlock=false;

// LOGIN
async function login(){
const email=document.getElementById('email').value;
const password=document.getElementById('password').value;

const res=await fetch(API+"/api/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,password})
});
const data=await res.json();

if(data.success){
token=data.token;
load();
show("home");
}else alert(data.message);
}

// REGISTER
async function register(){
const email=document.getElementById('email').value;
const password=document.getElementById('password').value;

const res=await fetch(API+"/api/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,password})
});
const data=await res.json();

if(data.success){
token=data.token;
load();
show("home");
}else alert(data.message);
}

// LOAD USER
async function load(){
const res=await fetch(API+"/api/user",{
headers:{Authorization:"Bearer "+token}
});
const data=await res.json();

coins=data.coins;
usdt=data.usdt;
referrals=data.referrals;
unlock=data.withdrawUnlocked;

update();
}

// TAP
async function tap(){ add(50); }

// DAILY
async function daily(){ add(1000); }

// ADD COINS
async function add(c){
const res=await fetch(API+"/api/user/coins",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify({coins:c})
});
const data=await res.json();
coins=data.coins;
usdt=data.usdt;
update();
}

// TASK
async function task(t){
const res=await fetch(API+"/api/user/task",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify({task:t})
});
const data=await res.json();
coins=data.coins;
update();
}

// WITHDRAW
async function withdraw(){
const res=await fetch(API+"/api/user/withdraw",{
method:"POST",
headers:{Authorization:"Bearer "+token}
});
const data=await res.json();
alert(data.message);
load();
}

// DEPOSIT
async function deposit(){
await fetch(API+"/api/user/depositUnlock",{
method:"POST",
headers:{Authorization:"Bearer "+token}
});
alert("Unlocked!");
load();
}

// UI
function update(){
document.getElementById("coins").innerText=coins;
document.getElementById("usdt").innerText=parseFloat(usdt).toFixed(2);
document.getElementById("status").innerText=
(coins>=20000 && referrals>=10)||unlock
?"Ready to withdraw"
:"Need 20000 coins + 10 referrals";
}

function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function goWithdraw(){ show("withdraw"); }
function back(){ show("home"); }

</script>
</body>
</html>
