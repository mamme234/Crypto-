<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<title>Crypto Ultra</title>

<style>
body{background:#000;color:#fff;text-align:center;font-family:sans-serif;}
.tap{width:160px;height:160px;border-radius:50%;background:gold;margin:20px auto;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:bold;box-shadow:0 0 30px gold;}
button{padding:10px;margin:5px;border:none;border-radius:10px;background:#111;color:#fff;}
input{padding:8px;margin:5px;border-radius:10px;border:none;}
</style>
</head>

<body>

<h2>💰 Crypto Ultra</h2>

<div>
Coins: <span id="coins">0</span><br>
USDT: <span id="usdt">0.00</span>
</div>

<div class="tap" onclick="tap()">TAP</div>

<!-- SOCIAL -->
<button onclick="task('tg')">📢 Telegram +500</button>
<button onclick="task('tiktok')">🎵 TikTok +1000</button>
<button onclick="task('yt')">▶️ YouTube +500</button>

<br><br>

<!-- REF -->
<input id="refLink" readonly style="width:70%">
<button onclick="copyRef()">Copy</button>

<br><br>

<!-- DEPOSIT -->
<input id="dep" placeholder="Deposit USDT">
<button onclick="deposit()">Deposit</button>

<br><br>

<!-- WITHDRAW -->
<input id="amount" placeholder="Withdraw USDT">
<button onclick="withdraw()">Withdraw</button>

<script>
const API="https://crypto-qhaj.onrender.com";

const tg=window.Telegram.WebApp;
tg.expand();

let user=tg.initDataUnsafe?.user?.username||"guest";
let ref=new URLSearchParams(location.search).get("start");

let state={coins:0,refs:0,deposit:0};

// LOGIN
function load(){
fetch(API+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:user,ref:ref})
})
.then(r=>r.json())
.then(d=>{
state=d.user;
update();
})
.catch(()=>alert("❌ Cannot connect to backend"));
}

// TAP
function tap(){
fetch(API+"/tap",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:user})
})
.then(r=>r.json())
.then(d=>{
state=d.user;
update();
});
}

// SOCIAL TASKS
function task(type){
fetch(API+"/reward",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:user,type:type})
})
.then(r=>r.json())
.then(d=>{
state=d.user;
update();
});
}

// DEPOSIT
function deposit(){
let amount=document.getElementById("dep").value;

fetch(API+"/deposit",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:user,amount})
})
.then(r=>r.json())
.then(d=>{
state=d.user;
update();
alert("✅ Deposit successful");
});
}

// WITHDRAW
function withdraw(){
let amount=document.getElementById("amount").value;

fetch(API+"/withdraw",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:user,amount})
})
.then(r=>r.json())
.then(d=>{
alert(d.error || d.message);
});
}

// UPDATE UI
function update(){
document.getElementById("coins").innerText=state.coins;
document.getElementById("usdt").innerText=(state.coins/100).toFixed(2);
document.getElementById("refLink").value=location.origin+"?start="+user;
}

// COPY REF
function copyRef(){
navigator.clipboard.writeText(document.getElementById("refLink").value);
alert("📋 Copied!");
}

// START
load();
</script>

</body>
</html>
